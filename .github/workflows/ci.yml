name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Lint / Type Check / Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: Lint (Oxlint)
        run: npx oxlint src/ test/

      - name: Format (Biome)
        run: npx biome check src/ test/

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test with Coverage
        run: npx vitest run --coverage --reporter=verbose

      - name: Build
        run: npx tsc
